<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spell It</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="card">
        <p class="eyebrow">Spell It · Practice Round</p>
        <h1>Listen. Spell. Learn.</h1>
 
        <div class="play-row">
            <button class="play-btn" id="play-btn" type="button" aria-label="Play word">
               <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <div class="wave" id="wave">
                <span></span><span></span><span></span><span></span><span></span><span></span><span></span><span></span>
            </div>
        </div>
 
        <form id="spell-form">
            <label for="word-input">Type the word you heard</label>
            <div class="input-row">
                <input type="text" id="word-input" readonly inputmode="none" autocomplete="off" autocapitalize="off" spellcheck="false" autocorrect="off" placeholder="start typing…" />
                <button id="submit-btn" type="button">Enter</button>
            </div>
            <p class="feedback" id="feedback"></p>
        </form>

        <div class="keyboard" id="keyboard">
            <div class="kb-row">
                <button class="key" data-key="q">q</button><button class="key" data-key="w">w</button><button class="key" data-key="e">e</button><button class="key" data-key="r">r</button><button class="key" data-key="t">t</button><button class="key" data-key="y">y</button><button class="key" data-key="u">u</button><button class="key" data-key="i">i</button><button class="key" data-key="o">o</button><button class="key" data-key="p">p</button>
            </div>
            <div class="kb-row kb-row-offset">
                <button class="key" data-key="a">a</button><button class="key" data-key="s">s</button><button class="key" data-key="d">d</button><button class="key" data-key="f">f</button><button class="key" data-key="g">g</button><button class="key" data-key="h">h</button><button class="key" data-key="j">j</button><button class="key" data-key="k">k</button><button class="key" data-key="l">l</button>
            </div>
            <div class="kb-row">
                <button class="key key-wide" id="kb-backspace" type="button" aria-label="Backspace">⌫</button>
                <button class="key" data-key="z">z</button><button class="key" data-key="x">x</button><button class="key" data-key="c">c</button><button class="key" data-key="v">v</button><button class="key" data-key="b">b</button><button class="key" data-key="n">n</button><button class="key" data-key="m">m</button>
                <button class="key key-wide key-enter" id="kb-enter" type="button" aria-label="Enter">↵</button>
            </div>
        </div>
 
        <div class="ledger">
            <div class="stat">
                <span class="stat-value" id="stat-correct">0</span>
                <span class="stat-label">Correct</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Attempted</span>
            </div>
            <div class="stat">
                <span class="stat-value" id="stat-pct">0%</span>
                <span class="stat-label">Accuracy</span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
